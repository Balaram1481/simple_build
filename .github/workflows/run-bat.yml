name : Run Batch script

on:
  push:
    branches: 
      - scripts_branch

jobs:
  run-batch-script:
    runs-on: windows-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: Message
        run: echo "Hello World"
      - name: Run batch script
        run: |
          echo " running batch script..."
          .\script.bat
        shell: cmd
